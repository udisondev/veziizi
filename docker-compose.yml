services:
  postgres:
    image: postgres:17-alpine
    container_name: veziizi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veziizi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veziizi}
      POSTGRES_DB: ${POSTGRES_DB:-veziizi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veziizi} -d ${POSTGRES_DB:-veziizi}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
